services:
  postgres:
    image: postgres:16
    container_name: event_management_postgres_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: myStrongPostgresPassword
      POSTGRES_DB: event_management
    ports:
      - 5432:5432
    networks:
      - backend_network
    volumes:
      - postgres_volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
  redis:
    image: redis:latest
    container_name: event_management_redis_container
    command: redis-server --requirepass myStrongRedisPassword
    ports:
      - 6380:6379
    networks:
      - backend_network
    volumes:
      - redis_volume:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "myStrongRedisPassword", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      - postgres
  redis-ui:
    image: rediscommander/redis-commander:latest
    container_name: event_management_redis_ui_container
    environment:
      # Format: connectionName:host:port:dbIndex:password
      - REDIS_HOSTS=local:redis:6379:0:myStrongRedisPassword
      # This helps the UI start even if it takes a second to find the redis container
      - HTTP_USER=admin
      - HTTP_PASSWORD=admin
    ports:
      - 8082:8081
    networks:
      - backend_network
    depends_on:
      - redis
  worker:
    container_name: event_management_worker_container
    build:
      context: ./worker
      dockerfile: Dockerfile
    env_file:
      - ./worker/.env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: myStrongRedisPassword
      DATABASE_URL: postgresql://postgres:myStrongPostgresPassword@postgres:5432/event_management
      NODE_ENV: development
    volumes:
      - ./worker/src:/app/src
      - ./worker/nodemon.json:/app/nodemon.json
      - worker_node_modules:/app/node_modules
      - ./worker/logs:/app/logs
    networks:
      - backend_network
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: event_management_server_container
    ports:
      - 5001:5000
    networks:
      - backend_network
    volumes:
      - "./server:/usr/src/app"
      - /usr/src/app/node_modules
    env_file:
      - ./server/.env
    environment:
      # Explicitly override so server always uses THIS compose's Redis —
      # not whatever is in .env (which may point to localhost or the other project's Redis)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: myStrongRedisPassword
      DATABASE_URL: postgresql://postgres:myStrongPostgresPassword@postgres:5432/event_management
    stop_grace_period: 8s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started

networks:
  backend_network:
    name: backend_network
    driver: bridge

volumes:
  redis_volume:
  postgres_volume:
  worker_node_modules:
